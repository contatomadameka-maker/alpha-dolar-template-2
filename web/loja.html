<style>

<script>
document.addEventListener('click',function(e){var b=document.getElementById('lang-float-btn');if(b&&!b.contains(e.target)){var m=document.getElementById('lang-float-menu');if(m)m.classList.remove('show');}});
var LANG_FLAGS={pt:'рЯЗІрЯЗЈ',en:'рЯЗЇрЯЗЄ',es:'рЯЗ™рЯЗЄ',hi:'рЯЗЃрЯЗ≥',id:'рЯЗЃрЯЗ©',th:'рЯЗєрЯЗ≠',vi:'рЯЗїрЯЗ≥',ar:'рЯЗЄрЯЗ¶',it:'рЯЗЃрЯЗє',fr:'рЯЗЂрЯЗЈ',de:'рЯЗ©рЯЗ™'};
var LANG_CODES={pt:'PT',en:'EN',es:'ES',hi:'HI',id:'ID',th:'TH',vi:'VI',ar:'AR',it:'IT',fr:'FR',de:'DE'};
function escolherIdioma(lang,flag,code){
  document.getElementById('lang-float-menu').classList.remove('show');
  document.getElementById('lang-current-flag').textContent=flag;
  document.getElementById('lang-current-name').textContent=code;
  localStorage.setItem('alpha_lang',lang);
  if(window.i18n){window.i18n.apply(lang);if(typeof window.trocarIdioma==='function'){var el=document.querySelector('[data-lang="'+lang+'"]');window.trocarIdioma(lang,el);}}
  else{location.reload();}
}
(function(){
  var saved=localStorage.getItem('alpha_lang');
  function setBtn(lang){var f=LANG_FLAGS[lang]||'рЯМР';var c=LANG_CODES[lang]||lang.toUpperCase();setTimeout(function(){var fe=document.getElementById('lang-current-flag');var ne=document.getElementById('lang-current-name');if(fe)fe.textContent=f;if(ne)ne.textContent=c;},100);}
  if(saved){setBtn(saved);return;}
  var bl=(navigator.language||'pt').toLowerCase().split('-')[0];
  var sup=['pt','en','es','hi','id','th','vi','ar','it','fr','de'];
  var det=sup.includes(bl)?bl:'pt';
  if(det!=='pt'){localStorage.setItem('alpha_lang',det);setTimeout(function(){setBtn(det);if(window.i18n)window.i18n.apply(det);},800);}
})();
</script>
